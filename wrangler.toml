name = "prismatic-care"
compatibility_date = "2024-11-01"
pages_build_output_dir = "public"

# Static site lives in public/. Functions live in functions/ at the repo root
# (outside public/), so Cloudflare Pages processes them as Functions and never
# serves them as static files.
#
# Configure in the Cloudflare dashboard (Settings > Functions) for the Git project:
#   KV namespace binding  CONTENT  -> your KV namespace
#   R2 bucket binding     MEDIA    -> your "prismatic-care-media" bucket
#   Secret ADMIN_PIN       (8+ chars, give to Alvin)
#   Secret SESSION_SECRET  (long random string)
